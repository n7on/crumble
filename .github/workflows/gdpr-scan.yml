name: GDPR Cookie Compliance Scan

on:
  schedule:
    # Run weekly on Mondays at 6:00 UTC
    - cron: '0 6 * * 1'
  workflow_dispatch:
    inputs:
      scan_file:
        description: 'Scan file to use (from configs/ folder)'
        type: string
        required: false
        default: 'swedish-municipalities.json'
      site_limit:
        description: 'Max number of sites to scan (0 = all)'
        type: string
        required: false
        default: '0'

permissions:
  contents: write

jobs:
  scan:
    runs-on: windows-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup PowerShell
        shell: pwsh
        run: |
          Write-Host "PowerShell $($PSVersionTable.PSVersion)"

      - name: Install Pup module
        shell: pwsh
        run: |
          Set-PSRepository -Name PSGallery -InstallationPolicy Trusted
          Install-Module -Name Pup -Scope CurrentUser -Force
          Import-Module Pup

      - name: Install Chrome for Pup
        shell: pwsh
        run: |
          Import-Module Pup
          Install-PupBrowser -BrowserType Chrome

      - name: Run GDPR scan and generate report
        id: scan
        shell: pwsh
        env:
          SCAN_FILE: ${{ github.event.inputs.scan_file || 'swedish-municipalities.json' }}
          SITE_LIMIT: ${{ github.event.inputs.site_limit || '0' }}
        run: |
          $limitParam = @{}
          if ([int]$env:SITE_LIMIT -gt 0) {
              $limitParam['Limit'] = [int]$env:SITE_LIMIT
          }
          
          ./scripts/Start-CrumbleScan.ps1 -ScanPath "./configs/$env:SCAN_FILE" -OutputPath "./report.html" -Pdf @limitParam

      - name: Upload reports artifact
        uses: actions/upload-artifact@v4
        with:
          name: gdpr-compliance-report
          path: |
            report.json
            report.pdf
            report.html
